name: Generate Snake Game

on:
  schedule:
    # Runs at 00:00 and 12:00 UTC every day (much easier on GitHub's servers)
    - cron: "0 */12 * * *"
  workflow_dispatch:
  # Also runs automatically on push to the main branch to see changes instantly
  push:
    branches:
      - main

jobs:
  build:
    name: Update Snake Animation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # 1. Checks out your repository so the workflow can access it
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Generates the snake files using the official, optimized 'Platane/snk'
      - name: Generate Snake Files
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          # A modern requirement to ensure the action can fetch your contribution grid graph
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. Deploys the generated SVGs to the 'output' branch
      - name: Deploy to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
